[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "tulasi-ai-labs-api"
image = "python:3.9"

[services.env]
DATABASE_URL = ""
SECRET_KEY = ""
SUPABASE_URL = ""
SUPABASE_SERVICE_ROLE_KEY = ""
PORT = "8000"

[services.ports]
port = 8000
protocol = "TCP"

[services.health_checks]
path = "/health"
interval = 60
timeout = 10
retries = 3
